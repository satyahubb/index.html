<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#FFF8F0;font-family:'Nunito',sans-serif;}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none;}
#app{width:100%;min-height:100vh;background:#FFF8F0;}
.screen{min-height:100vh;padding-bottom:40px;}
.hidden{display:none!important;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes wordPop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1.08)}}

.fade-up{animation:fadeUp .35s ease both;}
.float{animation:float 3s ease-in-out infinite;}
.pop-in{animation:popIn .4s ease both;}

/* Cards */
.level-card{transition:transform .2s,box-shadow .2s;cursor:pointer;}
.level-card:hover{transform:translateY(-3px);}
.lesson-row{transition:transform .15s;cursor:pointer;}
.lesson-row:hover{transform:translateX(4px);}
.answer-btn{transition:transform .15s,background .15s;cursor:pointer;}
.answer-btn:hover{transform:scale(1.02);}

/* Word highlight */
.word{display:inline-block;transition:all .25s;border-radius:8px;padding:2px 4px;}
.word.active{background:#FFD700;transform:scale(1.12);color:#1A2A3A;}

/* Range slider */
input[type=range]{-webkit-appearance:none;appearance:none;height:8px;border-radius:8px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:white;box-shadow:0 2px 8px rgba(0,0,0,.25);cursor:pointer;border:3px solid #E07B4A;}

/* Modal backdrop */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-sheet{background:#fff;border-radius:28px 28px 0 0;width:100%;max-width:680px;padding:24px 22px 48px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:fadeUp .3s ease both;}
.modal-handle{width:40px;height:4px;background:#E0D8D0;border-radius:2px;margin:0 auto 20px;}

/* Confetti */
.confetti-piece{position:fixed;pointer-events:none;border-radius:3px;animation:confettiFall linear both;}

/* Fullscreen */
#fs-btn{position:fixed;top:12px;right:12px;z-index:500;background:rgba(0,0,0,.35);border:none;border-radius:12px;padding:8px 12px;color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(6px);transition:background .2s;}
#fs-btn:hover{background:rgba(0,0,0,.6);}
body:fullscreen #fs-btn{background:rgba(255,255,255,.2);}
/* Wider content on big screens */
@media(min-width:700px){
  .screen{max-width:700px;margin:0 auto;}
  .modal-sheet{max-width:680px;}
}
@media(min-width:1000px){
  .screen{max-width:860px;margin:0 auto;}
}
</style>
</head>
<body>
<div id="err-display" style="display:none;position:fixed;inset:0;background:#fff;z-index:99999;padding:24px;font-family:monospace;font-size:13px;overflow:auto;"></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById("err-display");
  d.style.display = "block";
  d.innerHTML = "<h2 style='color:red;font-size:18px;margin-bottom:16px'>❌ JavaScript Error</h2>"
    + "<b>Message:</b> " + msg + "<br><br>"
    + "<b>Source:</b> " + src + "<br>"
    + "<b>Line:</b> " + line + " &nbsp; <b>Col:</b> " + col + "<br><br>"
    + (err ? "<b>Stack:</b><pre style='font-size:11px;white-space:pre-wrap'>" + err.stack + "</pre>" : "");
  return false;
};
window.addEventListener("unhandledrejection", function(e) {
  var d = document.getElementById("err-display");
  d.style.display = "block";
  d.innerHTML += "<h2 style='color:orange;font-size:18px;margin-bottom:8px'>⚠️ Unhandled Promise Rejection</h2>"
    + "<pre style='font-size:11px'>" + (e.reason ? e.reason.stack||e.reason : e) + "</pre>";
});
</script>

<script>
// ── FULLSCREEN ───────────────────────────────────────────────────────────────
function toggleFS(){

  if(btn) btn.textContent=document.fullscreenElement?'✕':'⛶';

// ── ELEVEN LABS VOICES ────────────────────────────────────────────────────────
const ELEVEN_VOICES = [
  {id:"EXAVITQu4vr4xnSDxMaL", name:"Bella",   desc:"Warm & clear female — ideal for reading",    preview:"Bella has a warm, clear voice perfect for reading aloud."},
  {id:"21m00Tcm4TlvDq8ikWAM", name:"Rachel",  desc:"Calm & professional female",                 preview:"Rachel speaks calmly and clearly."},
  {id:"MF3mGyEYCl7XYWbV9V6O", name:"Elli",    desc:"Friendly & approachable female",             preview:"Elli has a friendly, approachable voice."},
  {id:"AZnzlk1XvdvUeBnXmlld", name:"Domi",    desc:"Confident & articulate female",              preview:"Domi speaks confidently and clearly."},
  {id:"TxGEqnHWrfWFTfGW9XjX", name:"Josh",    desc:"Warm & natural male",                        preview:"Josh has a warm, natural male voice."},
  {id:"ErXwobaYiN019PkySvjV",  name:"Antoni", desc:"Smooth & clear male",                        preview:"Antoni speaks smoothly and clearly."},
  {id:"pNInz6obpgDQGcFmaJgB", name:"Adam",    desc:"Deep & reassuring male",                     preview:"Adam has a deep, reassuring voice."},
  {id:"yoZ06aMxZJJ28mfd3POQ", name:"Sam",     desc:"Neutral & steady voice",                     preview:"Sam speaks in a clear, neutral tone."},
];

// ── STORAGE ───────────────────────────────────────────────────────────────────
const SK  = "aphasia_eleven_key";
const SVK = "aphasia_eleven_voice";
const SCK = "aphasia_clone_id";
const SDK = "aphasia_done";

function lsGet(k,d){ try{return localStorage.getItem(k)||d;}catch(e){return d;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }

// ── VOICE ENGINE ──────────────────────────────────────────────────────────────
let _elevenKey    = lsGet(SK,"");
let _elevenVoice  = lsGet(SCK,"") || lsGet(SVK,"EXAVITQu4vr4xnSDxMaL");
let _bVoice       = null;
let _currentAudio = null;
const _cache      = {};

(function initBrowserVoice(){
  const PREF = ["Microsoft Aria Online (Natural)","Microsoft Jenny Online (Natural)",
    "Samantha (Enhanced)","Karen (Enhanced)","Samantha","Karen",
    "Google UK English Female","Google US English"];
  function pick(voices){
    for(const n of PREF){ const v=voices.find(x=>x.name===n); if(v){_bVoice=v;return;} }
    const eng=voices.filter(v=>v.lang&&v.lang.startsWith("en"));
    _bVoice=eng.find(v=>/female|aria|jenny|karen|samantha/i.test(v.name))||eng[0]||voices[0]||null;
  }
  const v=window.speechSynthesis.getVoices();
  if(v.length) pick(v); else window.speechSynthesis.onvoiceschanged=()=>pick(window.speechSynthesis.getVoices());
})();

function stopAudio(){
  if(_currentAudio){try{_currentAudio.pause();}catch(e){} _currentAudio=null;}
  if(window.speechSynthesis) window.speechSynthesis.cancel();
}

function speakBrowser(text,rate){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate||0.8; u.pitch=1.05; u.lang="en-GB";
  if(_bVoice) u.voice=_bVoice;
  setTimeout(()=>window.speechSynthesis.speak(u),100);
}

function speakEleven(text,rate){
  stopAudio();
  const ck=_elevenVoice+":"+text;
  if(_cache[ck]){
    _currentAudio=new Audio(_cache[ck]);
    _currentAudio.playbackRate=Math.max(.5,Math.min(2,rate||0.8));
    _currentAudio.play().catch(()=>speakBrowser(text,rate));
    return;
  }
  const isFile = window.location.protocol==="file:";
  if(isFile){ speakBrowser(text,rate); showToast("⚠️ Open in Chrome via a server for ElevenLabs voice","#E07B4A"); return; }
  fetch("https://api.elevenlabs.io/v1/text-to-speech/"+_elevenVoice+"/stream",{
    method:"POST",
    headers:{"xi-api-key":_elevenKey,"Content-Type":"application/json","Accept":"audio/mpeg"},
    body:JSON.stringify({text,model_id:"eleven_turbo_v2",voice_settings:{stability:.5,similarity_boost:.85,style:.15,use_speaker_boost:true}})
  }).then(r=>{ if(!r.ok) throw new Error(r.status); return r.blob(); })
    .then(b=>{ const u=URL.createObjectURL(b); _cache[ck]=u; _currentAudio=new Audio(u); _currentAudio.playbackRate=Math.max(.5,Math.min(2,rate||0.8)); _currentAudio.play().catch(()=>speakBrowser(text,rate)); })
    .catch(()=>speakBrowser(text,rate));
}

function speak(text,rate){ _elevenKey ? speakEleven(text,rate) : speakBrowser(text,rate); }

// ── PROGRESS ──────────────────────────────────────────────────────────────────
let _done = new Set(JSON.parse(lsGet(SDK,"[]")));
function markDone(id){ _done.add(id); lsSet(SDK,JSON.stringify([..._done])); }
function isDone(id){ return _done.has(id); }

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, color){
  color = color||"#1A2A3A";
  const t=document.createElement("div");
  t.textContent=msg;
  Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:color,color:"#fff",padding:"12px 20px",borderRadius:"16px",fontSize:"14px",fontWeight:"700",zIndex:"9999",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 20px rgba(0,0,0,.25)",maxWidth:"90%",textAlign:"center",animation:"fadeUp .3s ease both"});
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
const CONF_COLORS=["#FFD700","#FF6B6B","#4ECDC4","#45B7D1","#96CEB4","#FFEAA7","#DDA0DD","#98D8C8"];
function showConfetti(){
  for(let i=0;i<28;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    const size=6+Math.random()*8;
    Object.assign(el.style,{
      left:Math.random()*100+"vw", top:"-20px", width:size+"px", height:size+"px",
      background:CONF_COLORS[i%CONF_COLORS.length],
      animationDuration:(2+Math.random()*1.5)+"s",
      animationDelay:(Math.random()*.8)+"s",
    });
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag, attrs, ...children){
  const e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(k=>{
    if(k==="style"&&typeof attrs[k]==="object") Object.assign(e.style,attrs[k]);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==="className") e.className=attrs[k];
    else e.setAttribute(k,attrs[k]);
  });
  children.flat().forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}
function div(a,...c){ return el("div",a,...c); }
function btn(a,...c){ return el("button",a,...c); }
function p(a,...c){ return el("p",a,...c); }
function span(a,...c){ return el("span",a,...c); }

// ── ROUTER ────────────────────────────────────────────────────────────────────
let _state = { screen:"home", level:null, lesson:null };

function navigate(screen, extra){
  stopAudio();
  _state = { screen, ...extra };
  render();
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML="";
  if(_state.screen==="home")   app.appendChild(renderHome());
  if(_state.screen==="level")  app.appendChild(renderLevelScreen());
  if(_state.screen==="lesson") app.appendChild(renderLesson());
}

  inner.appendChild(vBtn);

  // Level cards

function renderLesson(){

      onClick:()=>{ if(answered) return; answered=true; selectedOpt=opt; handleAnswer(opt); }
    });
    ob.appendChild(div({style:{width:"48px",height:"48px",borderRadius:"14px",background:answered&&opt===selectedOpt?(opt.c?"rgba(255,255,255,.25)":"rgba(255,255,255,.5)"):"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px",flexShrink:"0",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}},opt.e));
    ob.appendChild(span({style:{fontFamily:"'Fredoka One',cursive",fontSize:"18px",color:answered&&opt===selectedOpt?"#fff":"#1A2A3A",flex:"1",letterSpacing:".3px"}},opt.l));
    opts.push(ob);
    compBox.appendChild(ob);
  });

  const nextBtnWrap=div({className:"hidden"});
  const nextBtn=btn({style:{width:"100%",background:level.gradient,borderRadius:"20px",padding:"20px",fontSize:"20px",fontWeight:"900",color:"#fff",boxShadow:"0 8px 28px "+level.color+"60",fontFamily:"'Fredoka One',cursive",letterSpacing:"1px"},
    onClick:()=>{ stopAudio(); wordTimers.forEach(clearTimeout); markDone(lesson.id); navigate("level",{level}); }
  });
  nextBtnWrap.appendChild(nextBtn);
  compBox.appendChild(nextBtnWrap);
  body.appendChild(compBox);
  screen.appendChild(body);

  function handleAnswer(opt){
    // Rebuild option styles
    lesson.comprehension.opts.forEach((o,i)=>{
      const ob=opts[i];
      ob.style.cursor="default";
      if(o===opt){
        ob.style.background=o.c?"linear-gradient(135deg,#16A085,#30C8A8)":"linear-gradient(135deg,#E05070,#F08090)";
        ob.style.border="2px solid "+(o.c?"#16A085":"#E05070");
        // update text and icon color
        ob.querySelectorAll("div,span").forEach(ch=>{ if(ch.tagName!=="BUTTON") ch.style.color="#fff"; });
        // show result icon
        const icon=document.createElement("div");
        icon.textContent=o.c?"✅":"❌";
        icon.style.fontSize="28px";
        icon.style.animation="popIn .4s ease both";
        ob.appendChild(icon);
      }
    });
    if(opt.c){ showConfetti(); }
    nextBtn.textContent=opt.c?"🌟 Brilliant! Continue →":"➡️ Next Lesson";
    nextBtnWrap.classList.remove("hidden");
    nextBtnWrap.style.animation="fadeUp .5s ease both";
  }

  function playLesson(){
    if(isPlaying) return;
    isPlaying=true; updatePlayBtn();
    wordEls.forEach(w=>w.classList.remove("active"));
    speak(lesson.sentence, speed);

    // Word highlight timing
    const words=lesson.words;
    const baseMs=1000/speed;
    let delay=300;
    words.forEach((w,i)=>{
      const dur=Math.max(300, (w.length/5)*baseMs*0.6);
      const t=setTimeout(()=>{
        wordEls.forEach(we=>we.classList.remove("active"));
        if(wordEls[i]) wordEls[i].classList.add("active");
      },delay);
      wordTimers.push(t);
      delay+=dur;
    });
    const end=setTimeout(()=>{ wordEls.forEach(w=>w.classList.remove("active")); isPlaying=false; updatePlayBtn(); },delay+400);
    wordTimers.push(end);
  }

  // Auto-play on load
  setTimeout(()=>playLesson(), 600);
  return screen;
}

    ));

  function buildRecord(){

    sheet.appendChild(scriptBox);

    const timerBox=div({style:{background:isRecording?"#FFF0F8":"#F8F5F2",borderRadius:"20px",padding:"20px",marginBottom:"18px",textAlign:"center",border:"2px solid "+(isRecording?"#E05090":"#E0D8D0"),transition:"all .3s"}});
    const timerNum=el("div",{style:{fontFamily:"'Fredoka One',cursive",fontSize:"52px",color:isRecording?"#E05090":"#C0B8B0",letterSpacing:"2px",lineHeight:"1"}},fmt(duration));
    timerBox.appendChild(timerNum);
    const timerStatus=p({style:{fontSize:"13px",color:isRecording?"#E05090":"#A09080",fontWeight:"700",marginTop:"6px",marginBottom:"0"}},
      isRecording?"🔴 Recording… speak clearly":duration>0?"⏹ Stopped — tap Record Again or Continue":"Press Record when ready"

      if(duration>0&&audioBlob){

    sheet.appendChild(div({style:{background:"#E8F8F0",borderRadius:"20px",padding:"20px",marginBottom:"18px",textAlign:"center",border:"2px solid #A8EEC0"}},

  function buildDone(){
    sheet.appendChild(div({style:{background:"linear-gradient(135deg,#16A085,#30C8A8)",borderRadius:"22px",padding:"26px 20px",marginBottom:"18px",textAlign:"center"}},

      onClick:()=>{ step="intro"; errorMsg=""; buildSheet(); }
    },"← Try Again"));
    sheet.appendChild(row);
  }

  async function startRec(){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunks=[]; duration=0; isRecording=true;
      timerIv=setInterval(()=>{ duration++; buildSheet(); },1000);
      const mimeType=MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/ogg";
      mediaRec=new MediaRecorder(stream,{mimeType});
      mediaRec.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
      mediaRec.onstop=()=>{
        audioBlob=new Blob(chunks,{type:mediaRec.mimeType});
        audioUrl=URL.createObjectURL(audioBlob);
        stream.getTracks().forEach(t=>t.stop());
        isRecording=false;
        buildSheet();
      };
      mediaRec.start(200);
      buildSheet();
    }catch(e){
      errorMsg="Could not access your microphone. Please allow microphone access in Chrome settings and try again.";
      step="error"; buildSheet();
    }
  }

  function stopRec(){
    clearInterval(timerIv);
    if(mediaRec&&isRecording){ try{mediaRec.stop();}catch(e){} isRecording=false; }
  }

  async function uploadClone(){
    if(!audioBlob){ step="error"; errorMsg="No recording found. Please record again."; buildSheet(); return; }
    try{
      const form=new FormData();
      form.append("name","My Voice Clone");
      form.append("description","Personal voice clone");

      step="done"; buildSheet();
    }catch(e){
      errorMsg=e.message||"Upload failed. Check your internet connection and try again.";
      step="error"; buildSheet();
    }
  }

  buildSheet();
}

        if(!k){ showToast("Enter your API key first","#E07B4A"); prevBtn.textContent="▶"; return; }
        try{
          const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+v.id+"/stream",{method:"POST",headers:{"xi-api-key":k,"Content-Type":"application/json","Accept":"audio/mpeg"},body:JSON.stringify({text:v.preview,model_id:"eleven_turbo_v2",voice_settings:{stability:.5,similarity_boost:.85,style:.15,use_speaker_boost:true}})});
          if(!r.ok) throw new Error(r.status);
          const b=await r.blob(); new Audio(URL.createObjectURL(b)).play();
          prevBtn.textContent="✓";
        }catch(err){ prevBtn.textContent="✗"; showToast("Could not play preview — check your API key","#E05070"); }
        setTimeout(()=>prevBtn.textContent="▶",2000);
      }
    },"▶");
    row.appendChild(prevBtn);
    sheet.appendChild(row);
  });

  // Save button
  const saveBtn=btn({style:{width:"100%",background:"linear-gradient(135deg,#1A2A3A,#2E4050)",borderRadius:"16px",padding:"18px",fontSize:"16px",fontWeight:"900",color:"#fff",marginTop:"8px",boxShadow:"0 6px 20px rgba(26,42,58,.3)",fontFamily:"'Fredoka One',cursive",letterSpacing:".5px"},
    onClick:()=>{
      _elevenKey=keyInput.value.trim();
      lsSet(SK,_elevenKey);
      lsSet(SVK,_elevenVoice);
      showToast("✅ Voice settings saved!","#16A085");
      setTimeout(onClose,800);
    }
  },"💾 Save & Close");
  sheet.appendChild(saveBtn);
  sheet.appendChild(p({style:{textAlign:"center",fontSize:"11px",color:"#B0A898",marginTop:"10px"}},"Your key is saved locally on this device only"));
}

// ── SETUP SCREEN ──────────────────────────────────────────────────────────────
function renderSetup(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const screen=div({style:{minHeight:"100vh",background:"linear-gradient(160deg,#0D1B2A,#1A3A4A)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",textAlign:"center"}});
  screen.appendChild(div({style:{width:"96px",height:"96px",borderRadius:"28px",background:"linear-gradient(135deg,#E07B4A,#F5A06A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"50px",marginBottom:"24px",boxShadow:"0 12px 40px rgba(224,123,74,.5)",animation:"float 3s ease-in-out infinite"}},"🎙️"));
  screen.appendChild(el("h1",{style:{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:"28px",margin:"0 0 12px"}},"Set up your voice"));
  screen.appendChild(p({style:{color:"rgba(255,255,255,.65)",fontSize:"15px",lineHeight:"1.7",marginBottom:"32px",maxWidth:"340px"}},"For the most natural voice, set up ElevenLabs — free, takes 2 minutes. Or skip and use your browser's built-in voice."));

  const inner=div({style:{width:"100%",maxWidth:"380px"}});

  const setupBtn=btn({style:{width:"100%",padding:"18px",borderRadius:"18px",border:"none",fontSize:"18px",fontWeight:"900",color:"#fff",cursor:"pointer",background:"linear-gradient(135deg,#E07B4A,#F5A06A)",boxShadow:"0 6px 24px rgba(224,123,74,.44)",fontFamily:"'Fredoka One',cursive",letterSpacing:".5px",marginBottom:"12px"},
    onClick:()=>showVoiceModal()
  },"🚀 Set up ElevenLabs (free)");
  inner.appendChild(setupBtn);

  inner.appendChild(btn({style:{width:"100%",borderRadius:"18px",padding:"14px",border:"1.5px solid rgba(255,255,255,.2)",fontSize:"14px",fontWeight:"700",color:"rgba(255,255,255,.5)",background:"transparent",cursor:"pointer"},
    onClick:()=>{ lsSet(SK,"setup_skipped"); render(); }
  },"Skip — use basic browser voice"));
  screen.appendChild(inner);
  app.appendChild(screen);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
const alreadySetup = lsGet(SK,"")!=="";
if(!alreadySetup) renderSetup();
else render();
</script>
</body>
</html>
